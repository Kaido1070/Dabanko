name: DABANKO 6-Player Online Test

on:
  workflow_dispatch:
    inputs:
      game_url:
        description: رابط اللعبة
        required: true
        default: https://dabanko.pages.dev/

jobs:
  online-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run six-player test
        continue-on-error: true
        env:
          GAME_URL: ${{ inputs.game_url }}
        run: npm run test-online

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dabanko-online-test-report
          path: dabanko-online-report.json
          if-no-files-found: warn
          retention-days: 14